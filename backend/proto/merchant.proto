syntax = "proto3";

package authpackage;

service MerchantAuth {
    rpc Auth (AuthRegisterReq) returns (AuthRegisterRes);
    rpc Login (AuthLoginReq) returns (AuthLoginRes);
      rpc ValidateApiKey (ValidateRequest) returns (ValidateResponse);
}

message UserData {
    string id = 1;
    string name = 2;
    string ownerEmail = 3;
    string callbackUrl = 4;
}

message AuthRegisterReq {
    string name = 1;
    string ownerEmail = 2;
    string password = 3;
    string callbackUrl = 4;
}

message AuthRegisterRes {
  bool success = 1;
  string message = 2;
  string appId = 3;
  string name = 4;       
  string publicKey = 5;
  string secretKey = 6;
}

message AuthLoginReq {
    string ownerEmail = 1;
    string password = 2;
}

message AuthLoginRes {
    string token = 1;
}



message ValidateRequest {
  string apiKey = 1;
}

message ValidateResponse {
  bool valid = 1;
  string appId = 2;
  string merchantId = 3;
  string message = 4;
}